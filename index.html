<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPIDEY TODO</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="wallpaper"></div>

  <!-- Web pattern overlay -->
  <div class="web-overlay">
    <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <g stroke="white" stroke-width="0.8" fill="none">
        <line x1="400" y1="300" x2="400" y2="0"/>
        <line x1="400" y1="300" x2="693" y2="150"/>
        <line x1="400" y1="300" x2="693" y2="450"/>
        <line x1="400" y1="300" x2="400" y2="600"/>
        <line x1="400" y1="300" x2="107" y2="450"/>
        <line x1="400" y1="300" x2="107" y2="150"/>
        <line x1="400" y1="300" x2="800" y2="300"/>
        <line x1="400" y1="300" x2="0"   y2="300"/>
        <ellipse cx="400" cy="300" rx="80"  ry="50"/>
        <ellipse cx="400" cy="300" rx="160" ry="100"/>
        <ellipse cx="400" cy="300" rx="240" ry="150"/>
        <ellipse cx="400" cy="300" rx="320" ry="200"/>
        <ellipse cx="400" cy="300" rx="420" ry="260"/>
      </g>
    </svg>
  </div>

  <div class="scanline"></div>

  <div id="app">

    <!-- HEADER -->
    <div class="glass" id="header">
      <div class="header-top">
        <div class="logo-area">
          <img id="spider-logo" src="spider-logo.png" alt="Spider-Man Logo" />
          <div>
            <div id="logo-text">SPIDEY.TODO</div>
            <div class="logo-sub">Your private mission board</div>
          </div>
        </div>
        <div class="header-meta">
          <div id="clock">--:--:--</div>
          <div id="date-display">...</div>
        </div>
      </div>

      <div id="session-badge">
        <span>🔒</span>
        <span class="session-label">Agent ID:</span>
        <span class="session-val" id="session-display">...</span>
        <span class="session-label">· Private workspace</span>
      </div>

      <div class="stats-row">
        <div class="stat"><span class="stat-num" id="stat-total">0</span><span class="stat-label">Total</span></div>
        <div class="stat"><span class="stat-num" id="stat-active">0</span><span class="stat-label">Active</span></div>
        <div class="stat"><span class="stat-num" id="stat-done">0</span><span class="stat-label">Done</span></div>
        <div class="stat"><span class="stat-num" id="stat-overdue">0</span><span class="stat-label">Overdue</span></div>
      </div>
      <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
      <div class="progress-label" id="progress-label">0% Complete</div>
    </div>

    <!-- INPUT PANEL -->
    <div class="glass" id="input-section">
      <div class="section-label">⬡ New Mission</div>
      <div class="input-row">
        <div class="input-wrapper">
          <input type="text" id="task-input" placeholder="Enter your mission..." maxlength="200" autocomplete="off" />
        </div>
        <select id="priority-select" class="priority-select">
          <option value="medium">◈ Medium</option>
          <option value="low">◈ Low</option>
          <option value="high">◈ High</option>
          <option value="critical">◈ Critical</option>
        </select>
        <button id="add-btn">SHOOT</button>
      </div>
      <div class="due-row">
        <input type="datetime-local" id="due-input" />
        <input type="text" id="note-input" placeholder="Optional note..." maxlength="120" />
      </div>

      <!-- File import -->
      <div class="due-row" style="margin-top:10px;">
        <label id="file-upload-label">
          <span>📎</span>
          <span id="file-label-text">Import tasks from .txt / .pdf / .docx — or run import.py</span>
          <input type="file" id="file-import" accept=".txt,.pdf,.docx" style="display:none" />
        </label>
        <button id="import-btn">IMPORT</button>
      </div>
    </div>

    <!-- FILTER BAR -->
    <div id="filter-section">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Done</button>
      <button class="filter-btn" data-filter="overdue">Overdue</button>
      <div class="filter-spacer"></div>
      <input type="text" id="search-input" placeholder="🔍 Search..." />
      <button id="clear-all-btn" title="Remove every task">🗑 Clear All</button>
    </div>

    <!-- CONFIRM MODAL -->
    <div id="confirm-overlay">
      <div id="confirm-box" class="glass">
        <div id="confirm-icon">🕷️</div>
        <div id="confirm-title">WIPE ALL MISSIONS?</div>
        <div id="confirm-sub">This cannot be undone.</div>
        <div id="confirm-actions">
          <button id="confirm-yes">DESTROY</button>
          <button id="confirm-no">CANCEL</button>
        </div>
      </div>
    </div>

    <!-- TASK LIST -->
    <div id="tasks-section" class="glass">
      <div id="tasks-container"></div>
      <div id="empty-state">
        <span class="empty-icon">🕷️</span>
        <p class="empty-text">No missions in this sector</p>
      </div>
    </div>

  </div><!-- /#app -->

  <div id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
